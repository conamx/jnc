<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — JNC마케팅</title>
<style>
  :root {
    --bg: #f5f4f0; --white: #fff; --black: #111;
    --gray-100: #eeedea; --gray-200: #dddcd7; --gray-400: #9e9d98; --gray-600: #555450;
    --primary: #0052cc; --primary-light: #e8f0ff;
    --green: #00875a; --green-light: #e3f5ef;
    --red: #de350b; --red-light: #ffebe6;
    --yellow: #f59e0b; --yellow-light: #fffbeb;
    --font: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--black); line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  button { font-family: var(--font); cursor: pointer; }
  input, textarea, select { font-family: var(--font); }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--black);
  }
  .login-card {
    background: white; border-radius: 16px; padding: 48px 40px;
    width: 360px; box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .login-logo { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-logo span { color: var(--primary); }
  .login-sub { font-size: 13px; color: var(--gray-400); margin-bottom: 32px; }
  .login-label { font-size: 13px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 6px; }
  .login-input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200);
    border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  .login-input:focus { border-color: var(--primary); }
  .login-btn {
    width: 100%; padding: 13px; background: var(--primary); color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
    transition: background 0.2s;
  }
  .login-btn:hover { background: #0040a0; }
  .login-error { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }

  /* ── APP LAYOUT ── */
  #app { display: none; min-height: 100vh; }
  .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--black); color: white;
    padding: 24px 0; display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { padding: 0 20px 24px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-logo span { color: var(--primary); }
  .sidebar-section { padding: 20px 12px 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .sidebar-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.6); transition: all 0.2s;
    border-radius: 0; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-link:hover { color: white; background: rgba(255,255,255,0.06); }
  .sidebar-link.active { color: white; background: var(--primary); }
  .sidebar-badge {
    margin-left: auto; background: var(--primary); color: white;
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 100px;
  }
  .sidebar-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 10px 8px; }
  .sidebar-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .sidebar-user-name { font-size: 13px; font-weight: 600; color: white; }
  .sidebar-user-email { font-size: 11px; color: rgba(255,255,255,0.4); }
  .logout-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; width: 100%; border: none; background: none;
    font-size: 13px; color: rgba(255,255,255,0.45); transition: color 0.2s;
  }
  .logout-btn:hover { color: var(--red); }

  /* ── MAIN ── */
  .main { overflow-y: auto; }
  .topbar {
    background: white; border-bottom: 1px solid var(--gray-200);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-title { font-size: 16px; font-weight: 700; }
  .topbar-actions { display: flex; gap: 10px; }

  /* PAGES */
  .page { display: none; padding: 32px; }
  .page.active { display: block; }

  /* ── DASHBOARD ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .stat-num { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 13px; color: var(--gray-400); }
  .stat-card.blue { border-top: 3px solid var(--primary); }
  .stat-card.green { border-top: 3px solid var(--green); }
  .stat-card.yellow { border-top: 3px solid var(--yellow); }
  .stat-card.gray { border-top: 3px solid var(--gray-400); }

  .recent-posts { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .section-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
  .section-header-title { font-size: 15px; font-weight: 700; }
  .recent-empty { padding: 48px; text-align: center; color: var(--gray-400); font-size: 14px; }

  /* ── EDITOR ── */
  .editor-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
  .editor-main { display: flex; flex-direction: column; gap: 16px; }
  .editor-sidebar-panel { display: flex; flex-direction: column; gap: 16px; }

  .card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .card-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.05em; }

  .title-input {
    width: 100%; border: none; outline: none; font-size: 24px; font-weight: 700;
    color: var(--black); background: transparent; padding: 0;
    border-bottom: 2px solid var(--gray-200); padding-bottom: 12px; margin-bottom: 4px;
    transition: border-color 0.2s;
  }
  .title-input:focus { border-bottom-color: var(--primary); }
  .title-input::placeholder { color: var(--gray-200); }
  .slug-preview { font-size: 12px; color: var(--gray-400); }
  .slug-preview span { color: var(--primary); }

  .toolbar {
    display: flex; gap: 4px; padding: 8px; background: var(--gray-100);
    border-radius: 8px; flex-wrap: wrap;
  }
  .toolbar-btn {
    padding: 6px 10px; border: none; background: none; border-radius: 6px;
    font-size: 13px; font-weight: 700; color: var(--gray-600);
    transition: background 0.15s, color 0.15s; min-width: 32px; text-align: center;
  }
  .toolbar-btn:hover { background: white; color: var(--black); }
  .toolbar-sep { width: 1px; background: var(--gray-200); margin: 4px 2px; }

  .editor-area {
    min-height: 400px; outline: none; font-size: 15px; line-height: 1.85;
    color: var(--black); padding: 16px 0;
  }
  .editor-area:empty::before { content: attr(data-placeholder); color: var(--gray-400); }
  .editor-area h2 { font-size: 22px; font-weight: 700; margin: 24px 0 12px; }
  .editor-area h3 { font-size: 18px; font-weight: 700; margin: 20px 0 10px; }
  .editor-area p { margin-bottom: 12px; }
  .editor-area ul, .editor-area ol { padding-left: 20px; margin-bottom: 12px; }
  .editor-area blockquote { border-left: 3px solid var(--primary); padding-left: 16px; color: var(--gray-600); margin: 16px 0; }
  .editor-area hr { border: none; border-top: 1px solid var(--gray-200); margin: 24px 0; }
  .editor-area a { color: var(--primary); }

  .char-count { font-size: 12px; color: var(--gray-400); text-align: right; margin-top: 8px; }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--gray-600); display: block; margin-bottom: 6px; }
  .form-input, .form-textarea, .form-select {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-200);
    border-radius: 7px; font-size: 13px; color: var(--black); outline: none;
    transition: border-color 0.2s; background: var(--bg);
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--primary); background: white; }
  .form-textarea { resize: vertical; min-height: 72px; }

  .publish-btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; transition: all 0.2s;
  }
  .btn-publish { background: var(--primary); color: white; }
  .btn-publish:hover { background: #0040a0; }
  .btn-draft { background: var(--gray-100); color: var(--gray-600); }
  .btn-draft:hover { background: var(--gray-200); }
  .btn-danger { background: var(--red-light); color: var(--red); }
  .btn-danger:hover { background: #ffd6cc; }

  .publish-status {
    font-size: 12px; padding: 8px 12px; border-radius: 6px;
    margin-top: 10px; display: none; text-align: center; font-weight: 600;
  }
  .publish-status.loading { background: var(--primary-light); color: var(--primary); display: block; }
  .publish-status.success { background: var(--green-light); color: var(--green); display: block; }
  .publish-status.error { background: var(--red-light); color: var(--red); display: block; }

  .cat-options { display: flex; flex-direction: column; gap: 6px; }
  .cat-option { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .cat-option input { accent-color: var(--primary); }

  .list-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .list-search {
    flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid var(--gray-200);
    border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .list-search:focus { border-color: var(--primary); }
  .list-filter {
    padding: 9px 14px; border: 1.5px solid var(--gray-200);
    border-radius: 8px; font-size: 13px; background: white; outline: none; cursor: pointer;
  }
  .post-table { width: 100%; border-collapse: collapse; }
  .post-table th { font-size: 12px; font-weight: 700; color: var(--gray-400); text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--gray-200); }
  .post-table td { padding: 14px 16px; border-bottom: 1px solid var(--gray-100); font-size: 13px; vertical-align: middle; }
  .post-table tr:last-child td { border-bottom: none; }
  .post-table tr:hover td { background: var(--bg); }
  .status-badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px;
    display: inline-block;
  }
  .status-published { background: var(--green-light); color: var(--green); }
  .status-draft { background: var(--yellow-light); color: var(--yellow); }
  .action-btn {
    padding: 5px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-edit { background: var(--primary-light); color: var(--primary); }
  .btn-edit:hover { background: #d0e3ff; }
  .btn-delete { background: var(--red-light); color: var(--red); margin-left: 4px; }
  .btn-delete:hover { background: #ffd6cc; }
  .table-empty { text-align: center; padding: 48px; color: var(--gray-400); }

  .settings-note { font-size: 13px; color: var(--gray-600); background: var(--primary-light); border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; line-height: 1.7; }
  .settings-note code { background: rgba(0,82,204,0.1); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

  #toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 9999;
    background: var(--black); color: white; padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; box-shadow: var(--shadow);
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--green); }
  #toast.error { background: var(--red); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-card { background: white; border-radius: 14px; padding: 32px; max-width: 380px; width: 90%; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .modal-desc { font-size: 14px; color: var(--gray-600); margin-bottom: 24px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel { padding: 9px 18px; border: 1.5px solid var(--gray-200); border-radius: 8px; background: none; font-size: 14px; font-weight: 600; }
  .modal-confirm { padding: 9px 18px; background: var(--red); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; }

  @media (max-width: 1024px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .editor-layout { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">JNC<span>마케팅</span></div>
    <div class="login-sub">관리자 페이지에 로그인하세요</div>
    <label class="login-label">아이디</label>
    <input class="login-input" id="loginId" type="text" placeholder="admin" autocomplete="username">
    <label class="login-label">비밀번호</label>
    <input class="login-input" id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">아이디 또는 비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">JNC<span>마케팅</span></div>
      <div class="sidebar-section">콘텐츠</div>
      <button class="sidebar-link active" onclick="showPage('dashboard', this)">📊 대시보드</button>
      <button class="sidebar-link" onclick="showPage('list', this); renderList()">
        📄 글 목록 <span class="sidebar-badge" id="sidebarCount">0</span>
      </button>
      <div class="sidebar-section">사이트</div>
      <a class="sidebar-link" href="/" target="_blank">🏠 홈 보기</a>
      <a class="sidebar-link" href="/blog" target="_blank">📰 블로그 보기</a>
      <div class="sidebar-section">설정</div>
      <button class="sidebar-link" onclick="showPage('settings', this)">⚙️ 설정</button>
      <div class="sidebar-bottom">
        <div class="sidebar-user">
          <div class="sidebar-avatar">👤</div>
          <div>
            <div class="sidebar-user-name">관리자</div>
            <div class="sidebar-user-email">admin@shareinfo.co.kr</div>
          </div>
        </div>
        <button class="logout-btn" onclick="doLogout()">🚪 로그아웃</button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbarTitle">📊 대시보드</div>
        <div class="topbar-actions" id="topbarActions"></div>
      </div>

      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">전체 글</div>
          </div>
          <div class="stat-card green">
            <div class="stat-num" id="statPublished">0</div>
            <div class="stat-label">발행됨</div>
          </div>
          <div class="stat-card yellow">
            <div class="stat-num" id="statDraft">0</div>
            <div class="stat-label">임시저장</div>
          </div>
          <div class="stat-card gray">
            <div class="stat-num">6</div>
            <div class="stat-label">카테고리</div>
          </div>
        </div>

        <div class="recent-posts">
          <div class="section-header">
            <div class="section-header-title">📄 최근 글</div>
          </div>
          <div id="dashboardList"><div class="recent-empty">✏️<br><br>아직 작성된 글이 없어요</div></div>
        </div>
      </div>

      <!-- LIST -->
      <div class="page" id="page-list">
        <div class="list-controls">
          <input class="list-search" type="text" placeholder="글 제목 검색..." oninput="filterList(this.value)">
          <select class="list-filter" onchange="filterList(document.querySelector('.list-search').value, this.value)">
            <option value="all">전체 상태</option>
            <option value="published">발행됨</option>
            <option value="draft">임시저장</option>
          </select>
        </div>
        <div class="recent-posts">
          <table class="post-table" id="postTable">
            <thead>
              <tr>
                <th>제목</th>
                <th>카테고리</th>
                <th>발행일</th>
                <th>상태</th>
                <th>링크</th>
              </tr>
            </thead>
            <tbody id="postTableBody">
              <tr><td colspan="5" class="table-empty">글이 없습니다</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- SETTINGS -->
      <div class="page" id="page-settings">
        <div style="max-width:600px;">
          <div class="card">
            <div class="card-title">⚙️ 설정</div>
            <div class="form-group">
              <label class="form-label">어드민 비밀번호 변경</label>
              <input class="form-input" id="newPassword" type="password" placeholder="새 비밀번호">
            </div>
            <button class="publish-btn btn-publish" style="width:auto; padding:10px 24px;" onclick="saveSettings()">설정 저장</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-card">
    <div class="modal-title">🗑 글 삭제</div>
    <div class="modal-desc">이 글을 삭제하면 복구할 수 없습니다.<br>정말 삭제하시겠어요?</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-confirm" onclick="doDelete()">삭제하기</button>
    </div>
  </div>
</div>

<script>
const ADMIN_ID = 'admin';
let ADMIN_PW = localStorage.getItem('adminPw') || 'jnc1234';

// ── AUTH ──
function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (id === ADMIN_ID && pw === ADMIN_PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadPosts().then(renderDashboard);
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

// ── NAV ──
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = { dashboard: '📊 대시보드', list: '📄 글 목록', settings: '⚙️ 설정' };
  document.getElementById('topbarTitle').textContent = titles[name] || name;
}

// ── POSTS — posts.json에서 로드 ──
let cachedPosts = [];

async function loadPosts() {
  try {
    const res = await fetch('/posts.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      cachedPosts = data.posts || [];
      return cachedPosts;
    }
  } catch(e) {
    console.error('posts.json 로드 실패:', e);
  }
  cachedPosts = [];
  return cachedPosts;
}

function updateSidebar() {
  document.getElementById('sidebarCount').textContent = cachedPosts.length;
  document.getElementById('statTotal').textContent = cachedPosts.length;
  document.getElementById('statPublished').textContent = cachedPosts.filter(p => p.status === 'published').length;
  document.getElementById('statDraft').textContent = cachedPosts.filter(p => p.status === 'draft').length;
}

// ── DASHBOARD ──
function renderDashboard() {
  updateSidebar();
  const recent = cachedPosts.slice(0, 5);
  const el = document.getElementById('dashboardList');
  if (!recent.length) {
    el.innerHTML = '<div class="recent-empty">✏️<br><br>아직 작성된 글이 없어요</div>';
    return;
  }
  el.innerHTML = '<table class="post-table"><thead><tr><th>제목</th><th>카테고리</th><th>상태</th><th>날짜</th></tr></thead><tbody>' +
    recent.map(p => `<tr>
      <td><strong>${p.title}</strong></td>
      <td>${p.category || '-'}</td>
      <td><span class="status-badge status-${p.status}">${p.status === 'published' ? '발행됨' : '임시저장'}</span></td>
      <td>${p.date}</td>
    </tr>`).join('') +
    '</tbody></table>';
}

// ── LIST ──
let listStatusFilter = 'all';
function renderList() {
  updateSidebar();
  filterList(document.querySelector('.list-search')?.value || '');
}
function filterList(search, status) {
  if (status !== undefined && status !== null) listStatusFilter = status;
  let posts = [...cachedPosts];
  if (search) posts = posts.filter(p => p.title.includes(search));
  if (listStatusFilter !== 'all') posts = posts.filter(p => p.status === listStatusFilter);

  const tbody = document.getElementById('postTableBody');
  if (!posts.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="table-empty">글이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = posts.map(p => `<tr>
    <td><strong>${p.title}</strong></td>
    <td>${p.category || '-'}</td>
    <td>${p.date}</td>
    <td><span class="status-badge status-${p.status}">${p.status === 'published' ? '발행됨' : '임시저장'}</span></td>
    <td><a href="/blog/${p.slug}/" target="_blank" style="color:var(--primary); font-size:12px;">보기 →</a></td>
  </tr>`).join('');
}

// ── SETTINGS ──
function saveSettings() {
  const pw = document.getElementById('newPassword').value;
  if (pw) { ADMIN_PW = pw; localStorage.setItem('adminPw', pw); }
  showToast('설정 저장 완료', 'success');
}

function closeModal() {
  document.getElementById('deleteModal').classList.remove('open');
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}
</script>
</body>
</html>
